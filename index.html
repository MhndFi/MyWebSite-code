<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <meta name="color-scheme" content="light" />
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com https://esm.sh; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.tailwindcss.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob: https:; connect-src 'self' https://esm.sh; frame-ancestors 'none'; base-uri 'self'; form-action 'self'"
    />
    <title>Mohannad Firon — Security Researcher</title>
    <link rel="icon" type="image/svg+xml" href="/images/mf-logo.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              // Quiet Light-inspired palette with purple primary
              primary: "#7C4DFF",
              "primary-soft": "#EDE3FB",
              "primary-strong": "#5E35B1",
              secondary: "#C72E2E",
              "secondary-light": "#5B5572",
              accent: "#3E8E41",
              info: "#2F86D2",
              "background-light": "#FFFFFF",
              "background-dark": "#F5F2FA",
              "panel-dark": "#FFFFFF",
              surface: "#FFFFFF",
              "surface-2": "#FAF7FE",
              titlebar: "#EFE9F7",
              "border-soft": "#E5DCF3",
              "border-strong": "#C9BCE4",
              ink: "#2D1B4E",
              "ink-muted": "#6B6385",
              "ink-dim": "#9991B0",
            },
            fontFamily: {
              display: ["Space Grotesk", "Inter", "system-ui", "sans-serif"],
              body: ["Inter", "system-ui", "sans-serif"],
              mono: ["JetBrains Mono", "ui-monospace", "SFMono-Regular", "monospace"],
            },
            backgroundImage: {
              "grid-pattern":
                "linear-gradient(to right, rgba(124,77,255,0.06) 1px, transparent 1px), linear-gradient(to bottom, rgba(124,77,255,0.06) 1px, transparent 1px)",
            },
            boxShadow: {
              "soft": "0 1px 2px rgba(45, 27, 78, 0.04), 0 4px 16px rgba(124, 77, 255, 0.06)",
              "soft-lg": "0 4px 12px rgba(45, 27, 78, 0.06), 0 12px 32px rgba(124, 77, 255, 0.10)",
              "ring-primary": "0 0 0 3px rgba(124, 77, 255, 0.18)",
            },
            animation: {
              blink: "blink 1s step-end infinite",
            },
            keyframes: {
              blink: {
                "50%": { opacity: "0" },
              },
            },
          },
        },
      };
    </script>
    <style>
      html, body {
        background-color: #F5F2FA;
        color: #2D1B4E;
        font-family: "Inter", system-ui, sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      /* Custom scrollbar — light + purple */
      ::-webkit-scrollbar {
        width: 10px;
        height: 10px;
      }
      ::-webkit-scrollbar-track {
        background: #F5F2FA;
      }
      ::-webkit-scrollbar-thumb {
        background: #D4C5E8;
        border-radius: 8px;
        border: 2px solid #F5F2FA;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #7C4DFF;
      }

      @media (prefers-reduced-motion: reduce) {
        .animate-blink, .animate-pulse, .animate-bounce, .transition-all, .transition-colors, .transition-transform {
          animation: none !important;
          transition: none !important;
        }
      }

      .blinking-cursor::after {
        content: "|";
        animation: blink 1s step-end infinite;
      }

      @keyframes blink {
        50% { opacity: 0; }
      }

      /* GPU hints, kept minimal */
      .animate-blink, .animate-pulse, .animate-bounce {
        will-change: opacity, transform;
      }

      .transition-all, .transition-transform, .transition-opacity {
        backface-visibility: hidden;
        transform: translateZ(0);
      }

      img {
        image-rendering: -webkit-optimize-contrast;
      }

      /* Selection — soft purple */
      ::selection {
        background: rgba(124, 77, 255, 0.22);
        color: #2D1B4E;
      }

      /* Konami easter egg — keeps a playful rainbow flash */
      @keyframes rainbow-glow {
        0%   { box-shadow: 0 0 24px rgba(255,0,0,0.45); }
        16%  { box-shadow: 0 0 24px rgba(255,127,0,0.45); }
        33%  { box-shadow: 0 0 24px rgba(255,210,0,0.45); }
        50%  { box-shadow: 0 0 24px rgba(0,200,80,0.45); }
        66%  { box-shadow: 0 0 24px rgba(0,120,255,0.45); }
        83%  { box-shadow: 0 0 24px rgba(124,77,255,0.55); }
        100% { box-shadow: 0 0 24px rgba(180,80,220,0.55); }
      }

      .konami-active {
        animation: rainbow-glow 2s linear infinite !important;
      }

      /* Focus rings (a11y) */
      :focus-visible {
        outline: 2px solid #7C4DFF;
        outline-offset: 2px;
        border-radius: 6px;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "lucide-react": "https://esm.sh/lucide-react@^0.562.0"
  }
}
</script>
</head>
  <body class="bg-background-dark text-ink font-body overflow-x-hidden">
    <div id="root"></div>
    <script type="module" src="./index.tsx"></script>
  </body>
</html>
